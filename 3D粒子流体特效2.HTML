<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级3D粒子流体特效 | 交互式流体模拟</title>
    <!-- 使用可靠的CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <!-- 按需加载其他库，防止阻塞 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            transition: opacity 0.5s;
        }
        
        .loader {
            width: 80px;
            height: 80px;
            border: 5px solid transparent;
            border-top: 5px solid #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loading-text {
            font-size: 1.5rem;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        #error-message {
            display: none;
            background: rgba(255, 50, 50, 0.9);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            max-width: 500px;
            text-align: center;
        }
        
        #error-message button {
            background: white;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }
        
        /* 简化的样式以加快加载 */
        #header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            z-index: 20;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00ffff, #0080ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .subtitle {
            font-size: 1rem;
            color: #a0a0ff;
            opacity: 0.9;
        }
        
        #performance-warning {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 165, 0, 0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 100;
            display: none;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <div id="loading-text">正在初始化粒子系统...</div>
        <div id="progress-text">0%</div>
        <div id="error-message">
            <p>初始化失败。可能的原因：</p>
            <p>1. 浏览器不支持WebGL</p>
            <p>2. 设备性能不足</p>
            <p>3. 网络连接问题</p>
            <button onclick="retryInit()">重试</button>
            <button onclick="loadLiteVersion()">加载简化版本</button>
        </div>
    </div>
    
    <div id="performance-warning">
        <p>检测到性能问题，已自动降低粒子数量以优化性能。</p>
        <p>您可以在控制面板中手动调整。</p>
    </div>
    
    <div id="container">
        <div id="header">
            <h1>高级3D粒子流体模拟</h1>
            <p class="subtitle">实时交互式粒子流体动力学</p>
        </div>
        
        <div id="canvas-container"></div>
        
        <!-- 控制面板将在初始化后动态加载 -->
    </div>

    <script>
        // 性能检测和优化
        const performanceLevel = detectPerformanceLevel();
        let particleCount = performanceLevel === 'high' ? 5000 : 
                          performanceLevel === 'medium' ? 3000 : 1500;
        
        console.log('检测到性能级别:', performanceLevel, '粒子数量:', particleCount);
        
        // 全局变量
        let scene, camera, renderer, controls;
        let particles, particleSystem;
        let particlePositions, particleVelocities, particleColors;
        let particleGeometry, particleMaterial;
        
        // 简化参数配置
        let params = {
            particleSize: 2.0,
            viscosity: 0.6,
            flowSpeed: 1.2,
            interactionMode: 'attract',
            colorScheme: 'cyber'
        };
        
        // 检测设备性能级别
        function detectPerformanceLevel() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                
                if (!gl) {
                    throw new Error('WebGL not supported');
                }
                
                const gpuInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const gpuRenderer = gpuInfo ? gl.getParameter(gpuInfo.UNMASKED_RENDERER_WEBGL) : '';
                
                // 检测移动设备
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                // 检测内存
                const memory = performance.memory ? performance.memory.totalJSHeapSize : 0;
                
                // 检测核心数
                const cores = navigator.hardwareConcurrency || 2;
                
                if (isMobile) {
                    return cores >= 4 ? 'medium' : 'low';
                }
                
                if (memory > 500 * 1024 * 1024 && cores >= 4) {
                    return 'high';
                } else if (memory > 200 * 1024 * 1024 && cores >= 2) {
                    return 'medium';
                } else {
                    return 'low';
                }
            } catch (e) {
                console.error('性能检测失败:', e);
                return 'low';
            }
        }
        
        // 更新加载进度
        function updateLoadingProgress(step, totalSteps) {
            const progress = Math.round((step / totalSteps) * 100);
            document.getElementById('progress-text').textContent = `${progress}%`;
            
            const steps = [
                '正在加载Three.js库...',
                '正在创建3D场景...',
                '正在初始化粒子系统...',
                '正在设置交互控制...',
                '正在启动动画循环...'
            ];
            
            document.getElementById('loading-text').textContent = steps[step - 1] || '正在完成初始化...';
        }
        
        // 显示错误信息
        function showError(message) {
            document.getElementById('loading-text').textContent = '初始化失败';
            document.getElementById('progress-text').style.display = 'none';
            document.getElementById('error-message').style.display = 'block';
            console.error('初始化错误:', message);
        }
        
        // 重试初始化
        function retryInit() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('progress-text').style.display = 'block';
            document.getElementById('progress-text').textContent = '0%';
            document.getElementById('loading-text').textContent = '正在重试初始化...';
            
            // 降低粒子数量
            particleCount = Math.max(1000, Math.floor(particleCount * 0.7));
            
            setTimeout(init, 100);
        }
        
        // 加载简化版本
        function loadLiteVersion() {
            particleCount = 1000;
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('progress-text').style.display = 'block';
            document.getElementById('progress-text').textContent = '0%';
            document.getElementById('loading-text').textContent = '正在加载简化版本...';
            setTimeout(init, 100);
        }
        
        // 显示性能警告
        function showPerformanceWarning() {
            if (performanceLevel !== 'high') {
                document.getElementById('performance-warning').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('performance-warning').style.display = 'none';
                }, 5000);
            }
        }
        
        // 初始化Three.js场景
        async function init() {
            try {
                updateLoadingProgress(1, 5);
                
                // 检查Three.js是否加载成功
                if (typeof THREE === 'undefined') {
                    throw new Error('Three.js库加载失败');
                }
                
                updateLoadingProgress(2, 5);
                
                // 创建场景
                scene = new THREE.Scene();
                scene.fog = new THREE.Fog(0x000011, 15, 60);
                
                // 创建相机
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 35;
                camera.position.y = 15;
                
                updateLoadingProgress(3, 5);
                
                // 创建渲染器 - 简化配置以提高兼容性
                renderer = new THREE.WebGLRenderer({ 
                    antialias: performanceLevel !== 'low',
                    alpha: true
                });
                
                if (!renderer) {
                    throw new Error('无法创建WebGL渲染器');
                }
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, performanceLevel === 'high' ? 2 : 1));
                document.getElementById('canvas-container').appendChild(renderer.domElement);
                
                // 添加轨道控制器
                try {
                    controls = new THREE.OrbitControls(camera, renderer.domElement);
                    controls.enableDamping = true;
                    controls.dampingFactor = 0.05;
                } catch (e) {
                    console.warn('轨道控制器初始化失败:', e);
                }
                
                updateLoadingProgress(4, 5);
                
                // 添加基础光照
                const ambientLight = new THREE.AmbientLight(0x404080, 0.4);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
                directionalLight.position.set(20, 40, 30);
                scene.add(directionalLight);
                
                updateLoadingProgress(5, 5);
                
                // 使用优化的粒子初始化方法
                await initParticlesOptimized();
                
                // 添加事件监听
                setupEventListeners();
                
                // 显示性能警告
                showPerformanceWarning();
                
                // 隐藏加载界面
                setTimeout(() => {
                    document.getElementById('loading').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading').style.display = 'none';
                        // 动态加载控制面板
                        loadControlPanel();
                    }, 500);
                }, 500);
                
                // 开始动画循环
                animate();
                
            } catch (error) {
                showError(error.message);
            }
        }
        
        // 优化的粒子初始化方法
        async function initParticlesOptimized() {
            return new Promise((resolve) => {
                // 使用requestAnimationFrame分步初始化
                let initialized = 0;
                const batchSize = Math.min(500, Math.floor(particleCount / 10));
                
                // 创建粒子数据数组
                particlePositions = new Float32Array(particleCount * 3);
                particleVelocities = new Float32Array(particleCount * 3);
                particleColors = new Float32Array(particleCount * 3);
                
                // 分批次初始化粒子
                function initBatch() {
                    const end = Math.min(initialized + batchSize, particleCount);
                    
                    for (let i = initialized; i < end; i++) {
                        // 随机位置（在椭球体内）
                        const radiusX = 18, radiusY = 12, radiusZ = 18;
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        const r = Math.cbrt(Math.random());
                        
                        const x = radiusX * r * Math.sin(phi) * Math.cos(theta);
                        const y = radiusY * r * Math.sin(phi) * Math.sin(theta);
                        const z = radiusZ * r * Math.cos(phi);
                        
                        particlePositions[i * 3] = x;
                        particlePositions[i * 3 + 1] = y;
                        particlePositions[i * 3 + 2] = z;
                        
                        // 随机速度
                        particleVelocities[i * 3] = (Math.random() - 0.5) * 0.1;
                        particleVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
                        particleVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
                        
                        // 初始颜色
                        updateParticleColor(i);
                    }
                    
                    initialized = end;
                    
                    // 更新进度显示
                    const progress = Math.round((initialized / particleCount) * 100);
                    document.getElementById('progress-text').textContent = `${progress}%`;
                    document.getElementById('loading-text').textContent = `正在初始化粒子... ${initialized}/${particleCount}`;
                    
                    if (initialized < particleCount) {
                        // 继续下一批次
                        requestAnimationFrame(initBatch);
                    } else {
                        // 所有粒子初始化完成
                        createParticleSystem();
                        resolve();
                    }
                }
                
                // 开始批次初始化
                initBatch();
            });
        }
        
        // 创建粒子系统
        function createParticleSystem() {
            // 创建粒子几何体
            particleGeometry = new THREE.BufferGeometry();
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
            
            // 创建粒子材质（简化以提高性能）
            particleMaterial = new THREE.PointsMaterial({
                size: params.particleSize,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });
            
            // 创建粒子系统
            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);
            
            console.log('粒子系统创建完成，粒子数量:', particleCount);
        }
        
        // 更新粒子颜色
        function updateParticleColor(index) {
            const i = index * 3;
            
            // 简化颜色计算
            const speed = Math.sqrt(
                particleVelocities[i] * particleVelocities[i] +
                particleVelocities[i + 1] * particleVelocities[i + 1] +
                particleVelocities[i + 2] * particleVelocities[i + 2]
            );
            
            const intensity = Math.min(speed * 10, 1);
            
            // 根据颜色方案设置颜色
            switch(params.colorScheme) {
                case 'fire':
                    particleColors[i] = 1.0;
                    particleColors[i + 1] = 0.3 + intensity * 0.7;
                    particleColors[i + 2] = 0.1;
                    break;
                case 'neon':
                    particleColors[i] = 0.0;
                    particleColors[i + 1] = 0.8 + intensity * 0.2;
                    particleColors[i + 2] = 0.6 + (1 - intensity) * 0.4;
                    break;
                case 'cyber':
                default:
                    particleColors[i] = 0.0 + intensity * 0.5;
                    particleColors[i + 1] = 0.5 + intensity * 0.5;
                    particleColors[i + 2] = 1.0;
            }
        }
        
        // 优化的粒子更新函数
        function updateParticles() {
            // 使用更高效的计算方式
            const deltaTime = 0.016;
            const viscosityFactor = params.viscosity * 0.02;
            const flowFactor = params.flowSpeed;
            
            // 优化：减少循环内的计算
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // 当前位置
                const x = particlePositions[i3];
                const y = particlePositions[i3 + 1];
                const z = particlePositions[i3 + 2];
                
                // 当前速度
                const vx = particleVelocities[i3];
                const vy = particleVelocities[i3 + 1];
                const vz = particleVelocities[i3 + 2];
                
                // 计算作用力（简化版）
                let fx = 0, fy = 0, fz = 0;
                
                // 边界约束
                const boundary = 20;
                if (x < -boundary) fx = 0.02;
                if (x > boundary) fx = -0.02;
                if (y < -boundary) fy = 0.02;
                if (y > boundary) fy = -0.02;
                if (z < -boundary) fz = 0.02;
                if (z > boundary) fz = -0.02;
                
                // 粘度阻力
                fx -= vx * viscosityFactor;
                fy -= vy * viscosityFactor;
                fz -= vz * viscosityFactor;
                
                // 根据模式添加额外力
                switch(params.interactionMode) {
                    case 'vortex':
                        // 漩涡力
                        const centerDist = Math.sqrt(x*x + y*y + z*z);
                        if (centerDist > 2) {
                            const centerForce = -0.00005 * centerDist;
                            fx += x * centerForce;
                            fy += y * centerForce;
                            fz += z * centerForce;
                            
                            // 旋转力
                            const rotX = y * 0.0005 - z * 0.0003;
                            const rotY = z * 0.0005 - x * 0.0003;
                            const rotZ = x * 0.0005 - y * 0.0003;
                            fx += rotX;
                            fy += rotY;
                            fz += rotZ;
                        }
                        break;
                    case 'repel':
                        // 简单排斥力（向边界）
                        const distToCenter = Math.sqrt(x*x + y*y + z*z);
                        if (distToCenter > 5) {
                            fx -= x * 0.0001;
                            fy -= y * 0.0001;
                            fz -= z * 0.0001;
                        }
                        break;
                }
                
                // 更新速度
                particleVelocities[i3] += fx * flowFactor;
                particleVelocities[i3 + 1] += fy * flowFactor;
                particleVelocities[i3 + 2] += fz * flowFactor;
                
                // 速度限制
                const speed = Math.sqrt(vx*vx + vy*vy + vz*vz);
                const maxSpeed = 0.2 * flowFactor;
                if (speed > maxSpeed) {
                    const scale = maxSpeed / speed;
                    particleVelocities[i3] *= scale;
                    particleVelocities[i3 + 1] *= scale;
                    particleVelocities[i3 + 2] *= scale;
                }
                
                // 更新位置
                particlePositions[i3] += particleVelocities[i3];
                particlePositions[i3 + 1] += particleVelocities[i3 + 1];
                particlePositions[i3 + 2] += particleVelocities[i3 + 2];
                
                // 每10帧更新一次颜色（优化性能）
                if (Math.floor(i / 10) % 10 === 0) {
                    updateParticleColor(i);
                }
            }
            
            // 更新几何体
            particleGeometry.attributes.position.needsUpdate = true;
            particleGeometry.attributes.color.needsUpdate = true;
        }
        
        // 动态加载控制面板
        function loadControlPanel() {
            const controlPanelHTML = `
                <div id="controls-panel">
                    <div class="panel-title">控制面板</div>
                    
                    <div class="control-section">
                        <div class="section-title">粒子系统</div>
                        <div class="slider-container">
                            <div class="slider-label">
                                <span>粒子数量</span>
                                <span class="slider-value" id="particleCountValue">${particleCount}</span>
                            </div>
                            <input type="range" id="particleCount" min="500" max="8000" step="500" value="${particleCount}">
                        </div>
                        
                        <div class="slider-container">
                            <div class="slider-label">
                                <span>粒子大小</span>
                                <span class="slider-value" id="particleSizeValue">${params.particleSize}</span>
                            </div>
                            <input type="range" id="particleSize" min="0.5" max="5" step="0.5" value="${params.particleSize}">
                        </div>
                        
                        <div class="slider-container">
                            <div class="slider-label">
                                <span>流动速度</span>
                                <span class="slider-value" id="flowSpeedValue">${params.flowSpeed}</span>
                            </div>
                            <input type="range" id="flowSpeed" min="0.1" max="3" step="0.1" value="${params.flowSpeed}">
                        </div>
                    </div>
                    
                    <div class="control-section">
                        <div class="section-title">模拟模式</div>
                        <div class="mode-buttons">
                            <button class="active" id="modeAttract">吸引</button>
                            <button id="modeRepel">排斥</button>
                            <button id="modeVortex">漩涡</button>
                        </div>
                    </div>
                    
                    <div class="control-section">
                        <div class="section-title">颜色主题</div>
                        <div class="color-buttons">
                            <button class="color-btn active" data-scheme="cyber">赛博</button>
                            <button class="color-btn" data-scheme="fire">火焰</button>
                            <button class="color-btn" data-scheme="neon">霓虹</button>
                        </div>
                    </div>
                    
                    <div class="control-section">
                        <button id="resetBtn">重置</button>
                        <button id="togglePerformance">性能模式</button>
                    </div>
                </div>
            `;
            
            // 添加样式
            const style = document.createElement('style');
            style.textContent = `
                #controls-panel {
                    position: absolute;
                    top: 50%;
                    transform: translateY(-50%);
                    left: 20px;
                    background: rgba(0, 10, 30, 0.7);
                    backdrop-filter: blur(15px);
                    padding: 20px;
                    border-radius: 15px;
                    width: 300px;
                    z-index: 20;
                    border: 1px solid rgba(0, 200, 255, 0.2);
                    box-shadow: 0 10px 40px rgba(0, 100, 255, 0.2);
                    max-height: 80vh;
                    overflow-y: auto;
                }
                
                .panel-title {
                    font-size: 1.5rem;
                    margin-bottom: 15px;
                    color: #00ffff;
                    text-align: center;
                    border-bottom: 2px solid rgba(0, 200, 255, 0.3);
                    padding-bottom: 10px;
                }
                
                .control-section {
                    margin-bottom: 20px;
                    background: rgba(0, 20, 40, 0.4);
                    padding: 15px;
                    border-radius: 10px;
                }
                
                .section-title {
                    font-size: 1.2rem;
                    margin-bottom: 10px;
                    color: #80c0ff;
                }
                
                .slider-container {
                    margin-bottom: 15px;
                }
                
                .slider-label {
                    display: flex;
                    justify-content: space-between;
                    margin-bottom: 5px;
                    font-size: 0.9rem;
                    color: #c0e0ff;
                }
                
                .slider-value {
                    color: #00ffff;
                    font-weight: bold;
                }
                
                input[type="range"] {
                    width: 100%;
                    height: 6px;
                    -webkit-appearance: none;
                    background: linear-gradient(90deg, #003366, #0066cc);
                    border-radius: 3px;
                }
                
                input[type="range"]::-webkit-slider-thumb {
                    -webkit-appearance: none;
                    width: 18px;
                    height: 18px;
                    border-radius: 50%;
                    background: #00ffff;
                    cursor: pointer;
                    box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
                }
                
                .mode-buttons, .color-buttons {
                    display: flex;
                    gap: 10px;
                    margin-top: 10px;
                }
                
                button {
                    padding: 10px 15px;
                    border: none;
                    border-radius: 8px;
                    background: linear-gradient(135deg, #0055aa, #0088ff);
                    color: white;
                    font-weight: 600;
                    cursor: pointer;
                    flex: 1;
                    transition: all 0.3s;
                }
                
                button:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 5px 15px rgba(0, 150, 255, 0.4);
                }
                
                button.active {
                    background: linear-gradient(135deg, #00aaff, #00ffff);
                    box-shadow: 0 0 10px rgba(0, 200, 255, 0.8);
                }
                
                #togglePerformance {
                    background: linear-gradient(135deg, #aa5500, #ff8800);
                    margin-top: 10px;
                }
                
                @media (max-width: 768px) {
                    #controls-panel {
                        width: calc(100% - 40px);
                        top: auto;
                        bottom: 20px;
                        transform: none;
                        left: 20px;
                    }
                }
            `;
            
            document.head.appendChild(style);
            document.getElementById('container').insertAdjacentHTML('beforeend', controlPanelHTML);
            
            // 添加事件监听
            setupControlPanelEvents();
        }
        
        // 设置控制面板事件
        function setupControlPanelEvents() {
            // 粒子数量滑块
            document.getElementById('particleCount').addEventListener('input', function(e) {
                const newCount = parseInt(e.target.value);
                if (newCount !== particleCount) {
                    particleCount = newCount;
                    document.getElementById('particleCountValue').textContent = particleCount;
                    recreateParticles();
                }
            });
            
            // 粒子大小滑块
            document.getElementById('particleSize').addEventListener('input', function(e) {
                params.particleSize = parseFloat(e.target.value);
                document.getElementById('particleSizeValue').textContent = params.particleSize.toFixed(1);
                particleMaterial.size = params.particleSize;
            });
            
            // 流动速度滑块
            document.getElementById('flowSpeed').addEventListener('input', function(e) {
                params.flowSpeed = parseFloat(e.target.value);
                document.getElementById('flowSpeedValue').textContent = params.flowSpeed.toFixed(1);
            });
            
            // 模式按钮
            document.querySelectorAll('.mode-buttons button').forEach(button => {
                button.addEventListener('click', function() {
                    document.querySelectorAll('.mode-buttons button').forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    params.interactionMode = this.id.replace('mode', '').toLowerCase();
                });
            });
            
            // 颜色按钮
            document.querySelectorAll('.color-btn').forEach(button => {
                button.addEventListener('click', function() {
                    document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    params.colorScheme = this.dataset.scheme;
                    updateAllParticleColors();
                });
            });
            
            // 重置按钮
            document.getElementById('resetBtn').addEventListener('click', function() {
                particleCount = performanceLevel === 'high' ? 5000 : 
                              performanceLevel === 'medium' ? 3000 : 1500;
                params = {
                    particleSize: 2.0,
                    viscosity: 0.6,
                    flowSpeed: 1.2,
                    interactionMode: 'attract',
                    colorScheme: 'cyber'
                };
                
                // 更新UI
                document.getElementById('particleCount').value = particleCount;
                document.getElementById('particleSize').value = params.particleSize;
                document.getElementById('flowSpeed').value = params.flowSpeed;
                
                document.getElementById('particleCountValue').textContent = particleCount;
                document.getElementById('particleSizeValue').textContent = params.particleSize.toFixed(1);
                document.getElementById('flowSpeedValue').textContent = params.flowSpeed.toFixed(1);
                
                // 重置按钮状态
                document.querySelectorAll('.mode-buttons button').forEach(btn => btn.classList.remove('active'));
                document.getElementById('modeAttract').classList.add('active');
                
                document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.color-btn[data-scheme="cyber"]').classList.add('active');
                
                // 重新创建粒子
                recreateParticles();
                particleMaterial.size = params.particleSize;
            });
            
            // 性能模式切换
            let performanceMode = false;
            document.getElementById('togglePerformance').addEventListener('click', function() {
                performanceMode = !performanceMode;
                this.textContent = performanceMode ? '质量模式' : '性能模式';
                
                // 调整参数
                if (performanceMode) {
                    particleMaterial.opacity = 0.6;
                    particleMaterial.size = params.particleSize * 0.8;
                } else {
                    particleMaterial.opacity = 0.8;
                    particleMaterial.size = params.particleSize;
                }
            });
        }
        
        // 更新所有粒子颜色
        function updateAllParticleColors() {
            for (let i = 0; i < particleCount; i++) {
                updateParticleColor(i);
            }
            particleGeometry.attributes.color.needsUpdate = true;
        }
        
        // 重新创建粒子（优化版）
        function recreateParticles() {
            // 先移除旧系统
            if (particleSystem) {
                scene.remove(particleSystem);
                particleGeometry.dispose();
                particleMaterial.dispose();
            }
            
            // 显示加载提示
            const loadingOverlay = document.createElement('div');
            loadingOverlay.style.cssText = `
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.7);
                color: white;
                padding: 20px;
                border-radius: 10px;
                z-index: 100;
            `;
            loadingOverlay.textContent = `正在更新粒子系统... (${particleCount}个粒子)`;
            document.getElementById('container').appendChild(loadingOverlay);
            
            // 异步重新初始化粒子
            setTimeout(async () => {
                await initParticlesOptimized();
                document.getElementById('container').removeChild(loadingOverlay);
            }, 100);
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            window.addEventListener('resize', onWindowResize);
        }
        
        // 窗口大小调整
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新粒子
            updateParticles();
            
            // 更新控制器
            if (controls) {
                controls.update();
            }
            
            // 渲染场景
            renderer.render(scene, camera);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            // 延迟初始化，确保所有资源加载完成
            setTimeout(init, 100);
        });
        
        // 检测WebGL支持
        function checkWebGLSupport() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                return !!gl;
            } catch (e) {
                return false;
            }
        }
        
        // 页面加载时检查WebGL支持
        if (!checkWebGLSupport()) {
            showError('您的浏览器不支持WebGL，无法运行此特效。请尝试使用Chrome、Firefox或Edge浏览器。');
        }
    </script>
</body>
</html>
